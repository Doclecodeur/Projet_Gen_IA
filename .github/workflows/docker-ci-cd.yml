name: Github-Docker Hub MLOps pipeline - GEN_IA

env:
  DOCKER_USER: ${{secrets.DOCKER_USER}}
  DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
  REPO_NAME: ${{secrets.REPO_NAME}}

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ── CI : format, lint, tests (toutes les branches) ───────────────────────────
  ci_pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Format check
        run: |
          black --check app.py config.py

      - name: Lint
        run: |
          pylint --disable=R,C,E0611,E0401,E1123,W0718,W0613 app.py config.py

      - name: Test
        env:
          OPENAI_API_KEY: ${{secrets.OPENAI_API_KEY}}
          TAVILY_API_KEY: ${{secrets.TAVILY_API_KEY}}
          OPENWEATHER_API_KEY: ${{secrets.OPENWEATHER_API_KEY}}
        run: |
          python -m pytest -vv

  # ── CD : build et push Docker Hub (main uniquement) ──────────────────────────
  cd_pipeline:
    runs-on: ubuntu-latest
    needs: [ci_pipeline]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Docker login
        run: |
          docker login -u $DOCKER_USER -p $DOCKER_PASSWORD

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d--%M-%S')" >> $GITHUB_OUTPUT

      - name: Build the Docker image
        run: |
          docker build . --file Dockerfile \
            --tag $DOCKER_USER/$REPO_NAME:${{ steps.date.outputs.date }} \
            --tag $DOCKER_USER/$REPO_NAME:latest

      - name: Docker Push
        run: |
          docker push $DOCKER_USER/$REPO_NAME:${{ steps.date.outputs.date }}
          docker push $DOCKER_USER/$REPO_NAME:latest

  # ── CD : déploiement Render (main uniquement) ─────────────────────────────────
  cd_render:
    runs-on: ubuntu-latest
    needs: [cd_pipeline]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{secrets.RENDER_DEPLOY_HOOK_URL}}"

  # ── CD : déploiement AWS EC2 (main uniquement) ───────────────────────────────
  cd_aws:
    runs-on: ubuntu-latest
    needs: [cd_pipeline]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USER: ${{secrets.DOCKER_USER}}
          REPO_NAME: ${{secrets.REPO_NAME}}
          OPENAI_API_KEY: ${{secrets.OPENAI_API_KEY}}
          TAVILY_API_KEY: ${{secrets.TAVILY_API_KEY}}
          OPENWEATHER_API_KEY: ${{secrets.OPENWEATHER_API_KEY}}
        with:
          host: ${{secrets.EC2_HOST}}
          username: ubuntu
          key: ${{secrets.EC2_SSH_KEY}}
          envs: DOCKER_USER,REPO_NAME,OPENAI_API_KEY,TAVILY_API_KEY,OPENWEATHER_API_KEY
          script: |
            docker pull $DOCKER_USER/$REPO_NAME:latest
            docker stop gen-ia || true
            docker rm gen-ia || true
            docker run -d \
              -p 8000:8000 \
              -e OPENAI_API_KEY=$OPENAI_API_KEY \
              -e TAVILY_API_KEY=$TAVILY_API_KEY \
              -e OPENWEATHER_API_KEY=$OPENWEATHER_API_KEY \
              -v /home/ubuntu/chroma_db:/app/chroma_db \
              -v /home/ubuntu/data:/app/data \
              --restart unless-stopped \
              --name gen-ia \
              $DOCKER_USER/$REPO_NAME:latest
